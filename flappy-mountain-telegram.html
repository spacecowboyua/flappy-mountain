<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Mountain</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:#04071a; font-family:'Georgia', serif; touch-action:manipulation; }
  #game { display:block; width:100vw; height:100vh; }

  .screen {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px;
    background:rgba(4,7,26,0.82); backdrop-filter:blur(4px);
    z-index:10; transition:opacity 0.3s;
  }
  .screen.hidden { opacity:0; pointer-events:none; }

  h1 { color:#c8dcff; font-size:34px; letter-spacing:2px; text-shadow:0 0 24px rgba(100,150,255,0.5); }
  .record {
    color:#ffeeb0; font-size:18px; background:rgba(255,238,176,0.08);
    border:1px solid rgba(255,238,176,0.25); border-radius:14px; padding:10px 26px;
  }
  .record b { font-size:26px; display:block; text-align:center; margin-top:2px; }

  button {
    font-family:inherit; font-size:18px; color:#eaf2ff;
    background:linear-gradient(135deg,#2a4a98,#1a3070);
    border:1px solid rgba(160,200,255,0.35); border-radius:14px;
    padding:14px 44px; cursor:pointer; letter-spacing:1px;
    box-shadow:0 4px 20px rgba(40,80,200,0.35);
    transition:transform 0.12s, box-shadow 0.12s;
  }
  button:active { transform:scale(0.95); }
  button.secondary {
    background:rgba(200,220,255,0.07); box-shadow:none;
    font-size:15px; padding:10px 30px;
  }

  /* Bird picker */
  #birdScreen .birds {
    display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:6px 0;
  }
  .bird-card {
    width:96px; height:110px; border-radius:16px; cursor:pointer;
    background:rgba(200,220,255,0.05); border:2px solid rgba(160,200,255,0.18);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    transition:border-color 0.15s, background 0.15s;
  }
  .bird-card.active { border-color:#ffd24a; background:rgba(255,210,74,0.12); }
  .bird-card canvas { width:56px; height:56px; }
  .bird-card span { color:#b8ccf5; font-size:12px; }

  #gameOverScreen .score-big { color:#fff; font-size:52px; text-shadow:0 0 20px rgba(100,150,255,0.7); }
  .new-record { color:#ffd24a; font-size:16px; animation:pulse 1s infinite alternate; }
  @keyframes pulse { from{opacity:0.6;} to{opacity:1;} }
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- START SCREEN -->
<div class="screen" id="startScreen">
  <h1>Flappy Mountain</h1>
  <div class="record">Твій рекорд<b id="recordVal">0</b></div>
  <button id="playBtn">Грати ▶</button>
  <button class="secondary" id="birdBtn">🐦 Обрати пташку</button>
</div>

<!-- BIRD PICKER SCREEN -->
<div class="screen hidden" id="birdScreen">
  <h1 style="font-size:24px;">Обери пташку</h1>
  <div class="birds" id="birdGrid"></div>
  <button class="secondary" id="backBtn">← Назад</button>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen hidden" id="gameOverScreen">
  <h1 style="font-size:26px;">Гра закінчена</h1>
  <div class="score-big" id="finalScore">0</div>
  <div class="new-record hidden" id="newRecord">🏆 Новий рекорд!</div>
  <div class="record">Рекорд<b id="recordVal2">0</b></div>
  <button id="retryBtn">Ще раз ▶</button>
  <button class="secondary" id="menuBtn">Меню</button>
</div>

<script>
/* ===== Telegram WebApp init ===== */
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

/* ===== Bird skins ===== */
const BIRDS = [
  { id:'classic', name:'Класика',  body:'#f5c842', wing:'#e8a800', beak:'#ff8c00', extra:null },
  { id:'ice',     name:'Крижана',  body:'#9fd8ff', wing:'#5aa8e0', beak:'#3a7abf', extra:'ice' },
  { id:'fire',    name:'Вогняна',  body:'#ff7043', wing:'#d84315', beak:'#ffd54f', extra:'fire' },
  { id:'night',   name:'Нічна',    body:'#5c6bc0', wing:'#3949ab', beak:'#9fa8da', extra:'star' },
  { id:'pink',    name:'Рожева',   body:'#f48fb1', wing:'#ec407a', beak:'#ff8c00', extra:'heart' },
  { id:'ghost',   name:'Привид',   body:'rgba(220,235,255,0.55)', wing:'rgba(180,200,255,0.45)', beak:'rgba(200,220,255,0.7)', extra:'ghost' },
];

/* ===== Storage (Telegram CloudStorage + localStorage fallback) ===== */
function loadRecord(cb){
  if (tg?.CloudStorage) {
    tg.CloudStorage.getItem('record', (err,v)=> cb(parseInt(v)||parseInt(localStorage.getItem('fm_record'))||0));
  } else cb(parseInt(localStorage.getItem('fm_record'))||0);
}
function saveRecord(v){
  localStorage.setItem('fm_record', v);
  if (tg?.CloudStorage) tg.CloudStorage.setItem('record', String(v), ()=>{});
}
function loadSkin(){ return localStorage.getItem('fm_skin') || 'classic'; }
function saveSkin(id){
  localStorage.setItem('fm_skin', id);
  if (tg?.CloudStorage) tg.CloudStorage.setItem('skin', id, ()=>{});
}

/* ===== Canvas setup ===== */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize', resize);

/* ===== Game state ===== */
let bird, pipes, score, state='menu', frame=0, record=0;
let currentSkin = BIRDS.find(b=>b.id===loadSkin()) || BIRDS[0];
let stars=[];

const GRAVITY=0.25, JUMP=-5.8, MAX_FALL=6, SPEED_BASE=2.4, PIPE_W=52;
function GAP(){ return Math.max(120, H*0.24); }
function groundY(){ return H*0.86; }

function initGame(){
  bird = { x:W*0.22, y:H*0.45, vy:0, r:Math.min(18, W*0.045) };
  pipes=[]; score=0; frame=0;
  stars = Array.from({length:30},()=>({
    x:Math.random()*W, y:Math.random()*H*0.5,
    r:Math.random()*1.5+0.4, t:Math.random()*Math.PI*2
  }));
}

function spawnPipe(){
  const g = GAP();
  const top = 50 + Math.random()*(groundY()-g-110);
  pipes.push({ x:W+10, top, scored:false });
}

/* ===== Background ===== */
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#04071a'); g.addColorStop(0.45,'#0d1535');
  g.addColorStop(0.78,'#1a2a5a'); g.addColorStop(1,'#253560');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  stars.forEach(s=>{
    const tw=Math.sin(s.t+frame*0.02)*0.5+0.5;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,220,255,${0.3+tw*0.7})`; ctx.fill();
  });

  // Moon
  const mx=W*0.8, my=H*0.1;
  const halo=ctx.createRadialGradient(mx,my,0,mx,my,60);
  halo.addColorStop(0,'rgba(200,215,255,0.13)'); halo.addColorStop(1,'rgba(200,215,255,0)');
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(mx,my,60,0,Math.PI*2); ctx.fill();
  const mg=ctx.createRadialGradient(mx,my,0,mx,my,24);
  mg.addColorStop(0,'#fff9e0'); mg.addColorStop(0.4,'#ffeeb0'); mg.addColorStop(1,'rgba(255,238,176,0)');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,24,0,Math.PI*2); ctx.fill();

  // Far mountains
  ctx.fillStyle='#1e2f6a'; ctx.globalAlpha=0.7;
  ctx.beginPath(); ctx.moveTo(0,H*0.72);
  for(let i=0;i<=10;i++){
    const x=i*(W/10);
    const y=H*(0.42+((i*37)%23)/100);
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H*0.72); ctx.closePath(); ctx.fill(); ctx.globalAlpha=1;

  // Main mountain
  const cx=W/2, ty=H*0.12, by=groundY();
  const mg2=ctx.createLinearGradient(W*0.2,ty,W*0.8,by);
  mg2.addColorStop(0,'#2a3d82'); mg2.addColorStop(0.4,'#1c2d6a'); mg2.addColorStop(1,'#0d1535');
  ctx.fillStyle=mg2;
  ctx.beginPath(); ctx.moveTo(cx,ty); ctx.lineTo(W*0.16,by); ctx.lineTo(W*0.84,by); ctx.closePath(); ctx.fill();

  const sh=ctx.createLinearGradient(cx,ty,W*0.84,by);
  sh.addColorStop(0,'rgba(5,12,34,0)'); sh.addColorStop(1,'rgba(5,12,34,0.8)');
  ctx.fillStyle=sh;
  ctx.beginPath(); ctx.moveTo(cx,ty); ctx.lineTo(cx,by); ctx.lineTo(W*0.84,by); ctx.closePath(); ctx.fill();

  // Snow cap
  const sw=W*0.09;
  const sg=ctx.createLinearGradient(cx-sw,ty,cx+sw,ty+H*0.16);
  sg.addColorStop(0,'#ddeeff'); sg.addColorStop(0.6,'#b0ccee'); sg.addColorStop(1,'#7aabdd');
  ctx.fillStyle=sg;
  ctx.beginPath(); ctx.moveTo(cx,ty);
  ctx.lineTo(cx-sw,ty+H*0.15); ctx.lineTo(cx-sw*0.65,ty+H*0.165);
  ctx.lineTo(cx-sw*0.3,ty+H*0.14); ctx.lineTo(cx,ty+H*0.158);
  ctx.lineTo(cx+sw*0.3,ty+H*0.13); ctx.lineTo(cx+sw*0.65,ty+H*0.16);
  ctx.lineTo(cx+sw,ty+H*0.145);
  ctx.closePath(); ctx.fill();

  // Mist
  const ma=0.15+Math.sin(frame*0.018)*0.06;
  const mist=ctx.createRadialGradient(W/2,H*0.78,0,W/2,H*0.78,W*0.4);
  mist.addColorStop(0,`rgba(74,110,181,${ma})`); mist.addColorStop(1,'rgba(74,110,181,0)');
  ctx.fillStyle=mist; ctx.fillRect(0,0,W,H);

  // Ground
  const gg=ctx.createLinearGradient(0,groundY(),0,H);
  gg.addColorStop(0,'#0e1c3e'); gg.addColorStop(1,'#060d20');
  ctx.fillStyle=gg; ctx.fillRect(0,groundY(),W,H-groundY());

  // Trees
  ctx.fillStyle='#06102a';
  [[W*0.06],[W*0.13],[W*0.86],[W*0.93]].forEach(([tx])=>{
    const ty2=groundY()+4;
    [[0,30],[10,16],[20,0]].forEach(([dw,dh])=>{
      ctx.beginPath();
      ctx.moveTo(tx,ty2-dh*1.4);
      ctx.lineTo(tx-9-dw/3,ty2+8-dh);
      ctx.lineTo(tx+9+dw/3,ty2+8-dh);
      ctx.closePath(); ctx.fill();
    });
  });
}

/* ===== Bird drawing ===== */
function drawBirdAt(c, x, y, r, skin, vy=0, t=0){
  const angle=Math.min(Math.max(vy*0.06,-0.5),0.9);
  c.save(); c.translate(x,y); c.rotate(angle);

  if(skin.extra==='fire'){
    c.fillStyle='rgba(255,120,40,0.3)';
    c.beginPath(); c.ellipse(-r*0.9,-2+Math.sin(t*0.3)*2,r*0.7,r*0.4,0,0,Math.PI*2); c.fill();
  }
  if(skin.extra==='ghost'){ c.globalAlpha=0.85; }

  c.fillStyle=skin.body;
  c.beginPath(); c.ellipse(0,0,r,r*0.8,0,0,Math.PI*2); c.fill();
  c.fillStyle=skin.wing;
  const flap=Math.sin(t*0.35)*r*0.15;
  c.beginPath(); c.ellipse(-r*0.25,r*0.25+flap,r*0.6,r*0.35,-0.5,0,Math.PI*2); c.fill();

  // Eye
  c.fillStyle='#fff';
  c.beginPath(); c.arc(r*0.45,-r*0.18,r*0.3,0,Math.PI*2); c.fill();
  c.fillStyle='#222';
  c.beginPath(); c.arc(r*0.53,-r*0.18,r*0.15,0,Math.PI*2); c.fill();
  c.fillStyle='#fff';
  c.beginPath(); c.arc(r*0.56,-r*0.25,r*0.06,0,Math.PI*2); c.fill();

  // Beak
  c.fillStyle=skin.beak;
  c.beginPath(); c.moveTo(r*0.75,-r*0.05); c.lineTo(r*1.2,r*0.05); c.lineTo(r*0.75,r*0.25); c.closePath(); c.fill();

  // Extras
  if(skin.extra==='ice'){
    c.strokeStyle='rgba(255,255,255,0.8)'; c.lineWidth=1.2;
    for(let i=0;i<3;i++){
      const a=i*2.1+0.5;
      c.beginPath();
      c.moveTo(Math.cos(a)*r*0.4, Math.sin(a)*r*0.35-r*0.1);
      c.lineTo(Math.cos(a)*r*0.6, Math.sin(a)*r*0.5-r*0.1);
      c.stroke();
    }
  }
  if(skin.extra==='star'){
    c.fillStyle='#ffd24a';
    const sx=-r*0.15, sy=-r*0.45;
    c.beginPath();
    for(let i=0;i<5;i++){
      const a=-Math.PI/2+i*2*Math.PI/5;
      const a2=a+Math.PI/5;
      c.lineTo(sx+Math.cos(a)*r*0.22, sy+Math.sin(a)*r*0.22);
      c.lineTo(sx+Math.cos(a2)*r*0.09, sy+Math.sin(a2)*r*0.09);
    }
    c.closePath(); c.fill();
  }
  if(skin.extra==='heart'){
    c.fillStyle='#e91e63';
    const hx=-r*0.1, hy=-r*0.5, hs=r*0.16;
    c.beginPath();
    c.moveTo(hx,hy+hs*0.6);
    c.bezierCurveTo(hx-hs,hy-hs*0.4,hx-hs*0.3,hy-hs*1.1,hx,hy-hs*0.3);
    c.bezierCurveTo(hx+hs*0.3,hy-hs*1.1,hx+hs,hy-hs*0.4,hx,hy+hs*0.6);
    c.fill();
  }
  c.globalAlpha=1;
  c.restore();
}

/* ===== Pipes ===== */
function drawPipes(){
  const g=GAP();
  pipes.forEach(p=>{
    const px=Math.round(p.x);
    const grad=ctx.createLinearGradient(px,0,px+PIPE_W,0);
    grad.addColorStop(0,'#1a3070'); grad.addColorStop(0.5,'#2a4a98'); grad.addColorStop(1,'#0d1535');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.roundRect(px,0,PIPE_W,p.top,[0,0,8,8]); ctx.fill();
    ctx.fillStyle='#2a4a98';
    ctx.beginPath(); ctx.roundRect(px-5,p.top-16,PIPE_W+10,16,[4,4,0,0]); ctx.fill();
    const bot=p.top+g;
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.roundRect(px,bot,PIPE_W,groundY()-bot,[8,8,0,0]); ctx.fill();
    ctx.fillStyle='#2a4a98';
    ctx.beginPath(); ctx.roundRect(px-5,bot,PIPE_W+10,16,[0,0,4,4]); ctx.fill();
    ctx.fillStyle='rgba(180,210,240,0.6)';
    ctx.beginPath(); ctx.ellipse(px+PIPE_W/2,p.top-16,PIPE_W*0.6,4,0,0,Math.PI*2); ctx.fill();
  });
}

/* ===== Logic ===== */
function speed(){ return SPEED_BASE + Math.min(score*0.05, 1.5); }

function collides(){
  const g=GAP(), r=bird.r-3;
  if(bird.y+r>groundY()||bird.y-r<0) return true;
  return pipes.some(p=>{
    if(bird.x+r>p.x && bird.x-r<p.x+PIPE_W){
      if(bird.y-r<p.top || bird.y+r>p.top+g) return true;
    }
    return false;
  });
}

function gameOver(){
  state='over';
  if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
  const isNew = score>record;
  if(isNew){ record=score; saveRecord(record); }
  document.getElementById('finalScore').textContent=score;
  document.getElementById('recordVal2').textContent=record;
  document.getElementById('newRecord').classList.toggle('hidden',!isNew);
  show('gameOverScreen');
}

function jump(){
  if(state!=='play') return;
  bird.vy=JUMP;
  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

canvas.addEventListener('pointerdown', jump);
document.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); jump(); }
});

/* ===== Loop ===== */
function loop(){
  drawBG();
  if(state==='play'){
    bird.vy+=GRAVITY;
    if(bird.vy>MAX_FALL) bird.vy=MAX_FALL;
    bird.y+=bird.vy;
    frame++;
    if(frame%85===0) spawnPipe();
    pipes.forEach(p=>p.x-=speed());
    pipes=pipes.filter(p=>p.x>-PIPE_W-20);
    pipes.forEach(p=>{ if(!p.scored&&p.x+PIPE_W<bird.x){ score++; p.scored=true;
      if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('soft'); }});
    if(collides()) gameOver();
    drawPipes();
    drawBirdAt(ctx,bird.x,bird.y,bird.r,currentSkin,bird.vy,frame);
    // Score
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.font='bold 36px Georgia';
    ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,80,0.7)'; ctx.shadowBlur=10;
    ctx.fillText(score,W/2,70);
    ctx.shadowBlur=0;
  } else {
    frame++;
    drawBirdAt(ctx,W*0.22,H*0.45+Math.sin(frame*0.04)*10,Math.min(18,W*0.045),currentSkin,0,frame);
  }
  requestAnimationFrame(loop);
}

/* ===== UI ===== */
const screens=['startScreen','birdScreen','gameOverScreen'];
function show(id){
  screens.forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));
}
function hideAll(){
  screens.forEach(s=>document.getElementById(s).classList.add('hidden'));
}

function startPlay(){
  initGame();
  state='play';
  hideAll();
  spawnPipe();
}

document.getElementById('playBtn').onclick=startPlay;
document.getElementById('retryBtn').onclick=startPlay;
document.getElementById('menuBtn').onclick=()=>{ state='menu'; updateRecordUI(); show('startScreen'); };
document.getElementById('birdBtn').onclick=()=>show('birdScreen');
document.getElementById('backBtn').onclick=()=>show('startScreen');

function updateRecordUI(){
  document.getElementById('recordVal').textContent=record;
}

/* Bird picker grid */
const grid=document.getElementById('birdGrid');
BIRDS.forEach(skin=>{
  const card=document.createElement('div');
  card.className='bird-card'+(skin.id===currentSkin.id?' active':'');
  const cv=document.createElement('canvas');
  cv.width=112; cv.height=112;
  const cc=cv.getContext('2d');
  card.appendChild(cv);
  const label=document.createElement('span');
  label.textContent=skin.name;
  card.appendChild(label);
  card.onclick=()=>{
    currentSkin=skin; saveSkin(skin.id);
    document.querySelectorAll('.bird-card').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
    if(tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
  };
  grid.appendChild(card);
  // Animate preview
  let t=0;
  (function anim(){
    cc.clearRect(0,0,112,112);
    drawBirdAt(cc,56,56+Math.sin(t*0.06)*4,24,skin,0,t);
    t++;
    requestAnimationFrame(anim);
  })();
});

/* ===== Init ===== */
loadRecord(v=>{
  record=v;
  updateRecordUI();
});
initGame();
loop();
</script>
</body>
</html>
